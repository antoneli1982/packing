    try {
      var t = localStorage.getItem('kanban-theme') || 'blue';
      document.documentElement.setAttribute('data-theme', t);
      var c = { blue: '#3b5cff', green: '#10b981', black: '#000000' }[t] || '#3b5cff';
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute('content', c);
    } catch (e) {}
  })();
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

  :root, [data-theme="blue"] {
    --bg: #0a0a0b;
    --bg-soft: #111113;
    --surface: #18181b;
    --surface-hover: #1f1f23;
    --border: #27272a;
    --border-soft: #1f1f23;
    --text: #fafafa;
    --text-dim: #a1a1aa;
    --text-faint: #71717a;
    --accent: #3b5cff;
    --accent-hover: #5b78ff;
    --accent-soft: #1a2240;
    --accent-text: #ffffff;
    --danger: #e11d48;
  }

  /* 🟢 Tema Verde */
  [data-theme="green"] {
    --bg: #07100b;
    --bg-soft: #0c1610;
    --surface: #121e16;
    --surface-hover: #19281d;
    --border: #1f3027;
    --border-soft: #16231b;
    --text: #f0faf3;
    --text-dim: #9bb6a5;
    --text-faint: #688574;
    --accent: #10b981;
    --accent-hover: #34d399;
    --accent-soft: #0c2a1f;
    --accent-text: #04140c;
    --danger: #f43f5e;
  }

  /* ⚫ Tema Preto (monocromático) */
  [data-theme="black"] {
    --bg: #000000;
    --bg-soft: #090909;
    --surface: #141414;
    --surface-hover: #1d1d1d;
    --border: #2a2a2a;
    --border-soft: #1a1a1a;
    --text: #fafafa;
    --text-dim: #a3a3a3;
    --text-faint: #6e6e6e;
    --accent: #f4f4f5;
    --accent-hover: #ffffff;
    --accent-soft: #1f1f1f;
    --accent-text: #0a0a0a;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: inherit; }
  html, body { height: 100%; }
  body {
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background: var(--bg);
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  .font-display { font-family: 'Poppins', sans-serif; font-weight: 600; letter-spacing: -0.02em; }
  .font-mono { font-family: 'Poppins', sans-serif; font-weight: 500; letter-spacing: 0; }

  .scrollbar-thin::-webkit-scrollbar { height: 8px; width: 8px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.18s ease-out; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  .modal-in { animation: modalIn 0.15s ease-out; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }

  .card-dragging { opacity: 0.4; }
  .column-drop-active { background: rgba(59, 92, 255, 0.07) !important; }

  input.kbn, textarea.kbn, select.kbn {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  input.kbn:focus, textarea.kbn:focus, select.kbn:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59, 92, 255, 0.18);
  }
  select.kbn { appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2371717a' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 8px center; background-size: 14px; padding-right: 28px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 6px; font-size: 13px; font-weight: 500;
    border: 1px solid transparent; cursor: pointer; transition: all 0.12s;
    font-family: inherit; background: transparent; color: inherit;
  }
  .btn-primary { background: var(--accent); color: var(--accent-text); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost { background: transparent; color: var(--text-dim); }
  .btn-ghost:hover { background: var(--surface); color: var(--text); }
  .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-outline:hover { background: var(--surface); border-color: #3f3f46; }
  .btn-danger { background: transparent; color: var(--danger); }
  .btn-danger:hover { background: rgba(225, 29, 72, 0.08); }

  .hover-bg:hover { background: rgba(255,255,255,0.05); }
  .hover-row:hover .row-action { opacity: 1; }
  .row-action { opacity: 0; transition: opacity 0.12s; }

  /* utilities */
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .flex-1 { flex: 1; }
  .flex-wrap { flex-wrap: wrap; }
  .items-center { align-items: center; }
  .items-start { align-items: flex-start; }
  .items-baseline { align-items: baseline; }
  .justify-between { justify-content: space-between; }
  .justify-center { justify-content: center; }
  .gap-1 { gap: 4px; }
  .gap-1\.5 { gap: 6px; }
  .gap-2 { gap: 8px; }
  .gap-2\.5 { gap: 10px; }
  .gap-3 { gap: 12px; }
  .gap-4 { gap: 16px; }
  .min-w-0 { min-width: 0; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .relative { position: relative; }
  .absolute { position: absolute; }
  .fixed { position: fixed; }
  .sticky { position: sticky; }
  .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
  .top-0 { top: 0; }
  .z-10 { z-index: 10; }
  .z-20 { z-index: 20; }
  .z-30 { z-index: 30; }
  .z-50 { z-index: 50; }
  .w-full { width: 100%; }
  .overflow-y-auto { overflow-y: auto; }
  .overflow-x-auto { overflow-x: auto; }
  .overflow-hidden { overflow: hidden; }
  .rounded { border-radius: 4px; }
  .rounded-md { border-radius: 6px; }
  .rounded-lg { border-radius: 8px; }
  .rounded-xl { border-radius: 12px; }
  .rounded-full { border-radius: 9999px; }
  .text-left { text-align: left; }

  /* Dept chip */
  .dept-chip {
    display: inline-flex; align-items: center; padding: 4px 10px;
    border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    transition: all 0.12s; user-select: none;
    background: var(--bg-soft); color: var(--text-dim);
  }
  .dept-chip:hover { border-color: #3f3f46; color: var(--text); }
  .dept-chip.active { color: #fff; border-color: transparent; }

  /* ============================================================ */
  /* 📱 RESPONSIVIDADE MOBILE                                       */
  /* ============================================================ */

  /* Safe-area iOS (notch / dynamic island) */
  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* Touch otimizado: previne zoom em double-tap e melhora scroll */
  button, a, [role="button"] { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  input, textarea, select { font-size: 16px !important; } /* iOS não dá zoom se >=16px */

  /* === Mobile menu drawer === */
  .mobile-menu-btn { display: none; }
  .mobile-only { display: none; }
  .desktop-only { display: flex; }

  .mobile-drawer-backdrop {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    animation: fadeIn 0.18s ease-out;
  }
  .mobile-drawer {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 50;
    width: 85%; max-width: 360px;
    background: var(--bg-soft); border-left: 1px solid var(--border);
    box-shadow: -20px 0 60px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
    animation: slideInRight 0.22s ease-out;
    overflow-y: auto;
  }
  @keyframes slideInRight {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  /* Grid responsivo das telas de visão geral (áreas / projetos) */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .overview-card:hover { transform: translateY(-2px); }
  @media (hover: none) {
    .overview-card:active { transform: scale(0.99); }
  }

  /* ===== TABLET (até 900px) ===== */
  @media (max-width: 900px) {
    .dash-grid-2 { grid-template-columns: 1fr !important; }
  }

  /* ===== MOBILE (até 640px) ===== */
  @media (max-width: 640px) {
    .mobile-menu-btn { display: inline-flex; }
    .mobile-only { display: flex; }
    .desktop-only { display: none !important; }
    .hide-on-mobile { display: none !important; }

    /* Header */
    .app-header { padding: 10px 14px !important; }
    .app-header .header-left { gap: 8px !important; }
    .app-header .brand-text-block { display: none; }
    .app-header .brand-mini { width: 36px !important; height: 36px !important; }
    .app-header .header-divider { display: none; }

    /* Main padding */
    .app-main { padding: 14px !important; }

    /* Board title */
    .board-title { font-size: 22px !important; }
    .board-meta-row { flex-direction: column; align-items: flex-start !important; gap: 12px !important; }

    /* Permissions panel: simplifica no mobile */
    .perm-panel { min-width: 0 !important; width: 100%; padding: 8px 12px !important; }

    /* Columns */
    .kanban-col { min-width: 86vw !important; max-width: 86vw !important; }

    /* Modais ocupam quase tudo */
    .kbn-modal { max-width: 100% !important; max-height: 100vh !important; height: 100%; border-radius: 0 !important; border: 0 !important; }
    .modal-body-grid-3 { grid-template-columns: 1fr !important; }
    .modal-padding { padding: 16px !important; }

    /* Dashboard */
    .dash-title { font-size: 22px !important; }
    .dash-kpi-card { min-width: 45% !important; padding: 14px !important; }
    .dash-kpi-value { font-size: 26px !important; }
    .dash-grid-2 { grid-template-columns: 1fr !important; gap: 12px !important; }
    .dash-scope-btns { flex-wrap: wrap; }

    /* Search input fica full no drawer */
    .search-input-wrapper { width: 100% !important; }
    .search-input-wrapper input { width: 100% !important; }

    /* Overview de áreas/projetos: 1 coluna no mobile */
    .overview-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
  }

  /* Esconde scrollbar no carrossel horizontal no mobile p/ visual mais limpo */
  @media (max-width: 640px) {
    .scrollbar-thin::-webkit-scrollbar { height: 0; }
  }
</style>

const Settings= (p) => <Svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></Svg>;

const TrendUp = (p)=> <Svg {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></Svg>;

// ============================================================
// HELPERS
// ============================================================
function permLabel(perm, departments) {
  if (perm === 'all') return 'Todos';
  if (!Array.isArray(perm) || perm.length === 0) return 'Nenhum';
  const names = departments.filter(d => perm.includes(d.id)).map(d => d.name);
  return names.length > 2 ? names.slice(0, 2).join(', ') + ` +${names.length - 2}` : names.join(', ');
}

// ============================================================
// SUB-COMPONENTES BASE
// ============================================================
function LabelTag({ colorId, onRemove }) {
  const c = LABEL_COLORS.find(l => l.id === colorId);
  if (!c) return null;
  return (
    <span style={{ background: c.bg + '22', color: c.bg, border: `1px solid ${c.bg}44`, padding: '2px 8px', borderRadius: 4, fontSize: 11, fontWeight: 500, display: 'inline-flex', alignItems: 'center', gap: 4 }}>
      {c.name}
      {onRemove && <button onClick={onRemove} style={{ background: 'none', border: 'none', color: 'inherit', cursor: 'pointer', padding: 0 }}><X size={10} /></button>}
    </span>
  );
}

function PriorityDot({ priority }) {
  const p = PRIORITIES[priority] || PRIORITIES.low;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--text-faint)' }}>
      <span style={{ background: p.dot, width: 7, height: 7, borderRadius: '50%' }} />
      {p.label}
    </span>
  );
}

function Card({ card, onClick, onDragStart, onDragEnd, isDragging }) {
  const dueOverdue = card.dueDate && new Date(card.dueDate) < new Date(new Date().toDateString());
  const [hover, setHover] = useState(false);
  const progress = card.progress ?? 0;
  const progOpt  = PROGRESS_OPTIONS.find(p => p.value === progress) || PROGRESS_OPTIONS[0];
  return (
    <div draggable onDragStart={onDragStart} onDragEnd={onDragEnd} onClick={onClick}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      className={`fade-in ${isDragging ? 'card-dragging' : ''}`}
      style={{ background: 'var(--surface)', border: `1px solid ${hover ? '#3f3f46' : 'var(--border)'}`, borderRadius: 8, padding: 12, cursor: 'grab', transition: 'border-color 0.12s', overflow: 'hidden' }}>
      {card.labels?.length > 0 && (
        <div className="flex flex-wrap gap-1" style={{ marginBottom: 8 }}>
          {card.labels.map(l => <LabelTag key={l} colorId={l} />)}
        </div>
      )}
      <div style={{ fontSize: 14, fontWeight: 500, lineHeight: 1.4, color: 'var(--text)' }}>{card.title}</div>
      {card.description && (
        <div style={{ fontSize: 12, marginTop: 6, color: 'var(--text-faint)', overflow: 'hidden' }}>
          {card.description.length > 80 ? card.description.slice(0, 80) + '…' : card.description}
        </div>
      )}

      {/* Progress bar */}
      <div style={{ marginTop: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
          <span style={{ fontSize: 10, color: 'var(--text-faint)', fontWeight: 500 }}>Progresso</span>
          <span style={{ fontSize: 10, fontWeight: 600, color: progOpt.color }}>{progOpt.label}</span>
        </div>
        <div style={{ height: 4, borderRadius: 4, background: 'var(--border)', overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${progress}%`, background: progOpt.color, borderRadius: 4, transition: 'width 0.3s ease' }} />
        </div>
      </div>

      <div className="flex items-center justify-between" style={{ gap: 8, marginTop: 10, paddingTop: 8, borderTop: '1px solid var(--border-soft)' }}>
        <div className="flex items-center flex-wrap" style={{ gap: 10 }}>
          {card.priority && card.priority !== 'low' && <PriorityDot priority={card.priority} />}
          {card.dueDate && (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 11, color: dueOverdue ? 'var(--danger)' : 'var(--text-faint)' }}>
              <Calendar size={11} />
              {new Date(card.dueDate + 'T00:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' })}
            </span>
          )}
        </div>
        {card.assignee && (
          <div title={card.assignee} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 500, borderRadius: '50%', width: 22, height: 22, background: 'var(--bg-soft)', color: 'var(--text-dim)', border: '1px solid var(--border)' }}>
            {card.assignee.slice(0, 2).toUpperCase()}
          </div>
        )}
      </div>
    </div>
  );
}

function Column({ column, onAddCard, onRenameColumn, onDeleteColumn, onCardClick,
  draggingCardId, onDragStartCard, onDragEndCard, onDropOnColumn, onDragOverColumn,
  isDropTarget, searchTerm }) {
  const [isAdding, setIsAdding] = useState(false);
  const [newCardTitle, setNewCardTitle] = useState('');
  const [editingName, setEditingName] = useState(false);
  const [nameValue, setNameValue] = useState(column.name);
  const [menuOpen, setMenuOpen] = useState(false);

  const filteredCards = searchTerm
    ? column.cards.filter(c => c.title.toLowerCase().includes(searchTerm.toLowerCase()) || c.description?.toLowerCase().includes(searchTerm.toLowerCase()))
    : column.cards;

  const submitNewCard = () => {
    const t = newCardTitle.trim();
    if (!t) { setIsAdding(false); return; }
    onAddCard(column.id, t);
    setNewCardTitle(''); setIsAdding(false);
  };
  const submitRename = () => {
    const n = nameValue.trim();
    if (n && n !== column.name) onRenameColumn(column.id, n);
    else setNameValue(column.name);
    setEditingName(false);
  };

  return (
    <div onDragOver={(e) => { e.preventDefault(); onDragOverColumn(column.id); }}
         onDrop={(e) => { e.preventDefault(); onDropOnColumn(column.id); }}
         className={`kanban-col flex flex-col rounded-lg ${isDropTarget ? 'column-drop-active' : ''}`}
         style={{ background: 'var(--bg-soft)', border: '1px solid var(--border-soft)', minWidth: 290, maxWidth: 290, height: 'fit-content', maxHeight: 'calc(100vh - 180px)', transition: 'background 0.15s', flexShrink: 0 }}>
      <div className="flex items-center justify-between" style={{ padding: '12px 12px 8px' }}>
        <div className="flex items-center gap-2 flex-1 min-w-0">
          {editingName ? (
            <input autoFocus className="kbn" style={{ padding: '4px 8px', fontSize: 13 }}
              value={nameValue} onChange={e => setNameValue(e.target.value)} onBlur={submitRename}
              onKeyDown={e => { if (e.key === 'Enter') submitRename(); if (e.key === 'Escape') { setNameValue(column.name); setEditingName(false); }}} />
          ) : (
            <button onClick={() => setEditingName(true)}
              style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left', flex: 1, padding: 0 }}
              className="truncate">
              {column.name}
            </button>
          )}
          <span className="font-mono" style={{ fontSize: 11, padding: '2px 6px', borderRadius: 4, background: 'var(--surface)', color: 'var(--text-faint)' }}>
            {column.cards.length}
          </span>
        </div>
        <div className="relative">
          <button className="btn btn-ghost" style={{ padding: 4 }} onClick={() => setMenuOpen(!menuOpen)}>
            <MoreHorizontal size={14} />
          </button>
          {menuOpen && (
            <>
              <div className="fixed inset-0 z-10" onClick={() => setMenuOpen(false)} />
              <div className="absolute fade-in" style={{ right: 0, top: 28, zIndex: 20, background: 'var(--surface)', border: '1px solid var(--border)', minWidth: 150, borderRadius: 6, padding: '4px 0', boxShadow: '0 10px 30px rgba(0,0,0,0.4)' }}>
                <button onClick={() => { setEditingName(true); setMenuOpen(false); }} className="hover-bg"
                  style={{ width: '100%', textAlign: 'left', padding: '6px 12px', fontSize: 13, color: 'var(--text-dim)', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8 }}>
                  <Edit3 size={12} /> Renomear
                </button>
                <button onClick={() => { onDeleteColumn(column.id); setMenuOpen(false); }} className="hover-bg"
                  style={{ width: '100%', textAlign: 'left', padding: '6px 12px', fontSize: 13, color: 'var(--danger)', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8 }}>
                  <Trash2 size={12} /> Excluir coluna
                </button>
              </div>
            </>
          )}
        </div>
      </div>

      <div className="flex flex-col gap-2 overflow-y-auto scrollbar-thin" style={{ padding: '0 8px 8px', minHeight: 20 }}>
        {filteredCards.map(card => (
          <Card key={card.id} card={card} isDragging={draggingCardId === card.id}
            onDragStart={() => onDragStartCard(card.id, column.id)}
            onDragEnd={onDragEndCard}
            onClick={() => onCardClick(card.id, column.id)} />
        ))}
        {column.cards.length === 0 && !isAdding && (
          <div style={{ fontSize: 12, textAlign: 'center', padding: '12px 0', color: 'var(--text-faint)' }}>
            Vazio. Arraste cards aqui.
          </div>
        )}
      </div>

      <div style={{ padding: '0 8px 8px' }}>
        {isAdding ? (
          <div className="flex flex-col gap-2" style={{ padding: 8, borderRadius: 8, background: 'var(--surface)', border: '1px solid var(--border)' }}>
            <textarea autoFocus className="kbn" style={{ resize: 'none', minHeight: 60, fontSize: 13 }}
              placeholder="Título do card…" value={newCardTitle}
              onChange={e => setNewCardTitle(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitNewCard(); } if (e.key === 'Escape') setIsAdding(false); }} />
            <div className="flex items-center gap-2">
              <button className="btn btn-primary" onClick={submitNewCard}><Check size={13} /> Adicionar</button>
              <button className="btn btn-ghost" onClick={() => { setIsAdding(false); setNewCardTitle(''); }}><X size={13} /></button>
            </div>
          </div>
        ) : (
          <button onClick={() => setIsAdding(true)}
            style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 6, padding: '8px 12px', borderRadius: 6, fontSize: 12, fontWeight: 500, color: 'var(--text-faint)', background: 'transparent', border: 'none', cursor: 'pointer', transition: 'all 0.12s' }}
            onMouseEnter={e => { e.currentTarget.style.background = 'var(--surface)'; e.currentTarget.style.color = 'var(--text)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-faint)'; }}>
            <Plus size={13} /> Novo card
          </button>
        )}
      </div>
    </div>
  );
}

function CardModal({ card, columnId, columns, onSave, onDelete, onClose, onMove }) {
  const [draft, setDraft] = useState(card);
  useEffect(() => { setDraft(card); }, [card]);
  if (!card) return null;

  const toggleLabel = (lid) => {
    const labels = draft.labels || [];
    setDraft({ ...draft, labels: labels.includes(lid) ? labels.filter(x => x !== lid) : [...labels, lid] });
  };
  const save = () => { onSave(draft); onClose(); };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center"
         style={{ padding: 16, background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(4px)' }}
         onClick={onClose}>
      <div className="kbn-modal modal-in flex flex-col"
        style={{ background: 'var(--bg-soft)', border: '1px solid var(--border)', width: '100%', maxWidth: 580, maxHeight: '90vh', borderRadius: 12, boxShadow: '0 20px 60px rgba(0,0,0,0.5)' }}
        onClick={e => e.stopPropagation()}>
        <div className="flex items-start justify-between" style={{ padding: '20px 20px 12px', borderBottom: '1px solid var(--border-soft)' }}>
          <input className="kbn font-display"
            style={{ fontSize: 20, fontWeight: 600, padding: '4px 8px', border: '1px solid transparent', background: 'transparent' }}
            value={draft.title} onChange={e => setDraft({ ...draft, title: e.target.value })} placeholder="Título" />
          <button onClick={onClose} className="btn btn-ghost" style={{ padding: 6 }}><X size={16} /></button>
        </div>

        <div className="modal-padding overflow-y-auto scrollbar-thin flex flex-col gap-4" style={{ padding: 20 }}>
          <div>
            <label style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, display: 'block', marginBottom: 6, color: 'var(--text-faint)' }}>Status (coluna)</label>
            <select className="kbn" value={columnId} onChange={e => onMove(card.id, columnId, e.target.value)}>
              {columns.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, display: 'block', marginBottom: 6, color: 'var(--text-faint)' }}>Descrição</label>
            <textarea className="kbn" style={{ minHeight: 100, resize: 'vertical' }}
              value={draft.description || ''} onChange={e => setDraft({ ...draft, description: e.target.value })}
              placeholder="Detalhes, contexto, links…" />
          </div>
          <div>
            <label style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, display: 'block', marginBottom: 6, color: 'var(--text-faint)' }}>Etiquetas</label>
            <div className="flex flex-wrap" style={{ gap: 6 }}>
              {LABEL_COLORS.map(l => {
                const active = (draft.labels || []).includes(l.id);
                return (
                  <button key={l.id} onClick={() => toggleLabel(l.id)}
                    style={{ padding: '4px 10px', borderRadius: 4, fontSize: 11, fontWeight: 500, cursor: 'pointer', transition: 'all 0.12s',
                      background: active ? l.bg : l.bg + '15', color: active ? '#0a0a0b' : l.bg,
                      border: `1px solid ${l.bg}${active ? 'ff' : '40'}` }}>
                    {l.name}
                  </button>
                );
              })}
            </div>
          </div>
          <div className="modal-body-grid-3" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
            <div>
              <label style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, display: 'block', marginBottom: 6, color: 'var(--text-faint)' }}>Prioridade</label>
              <select className="kbn" value={draft.priority || 'low'} onChange={e => setDraft({ ...draft, priority: e.target.value })}>
                {Object.entries(PRIORITIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, display: 'block', marginBottom: 6, color: 'var(--text-faint)' }}>Responsável</label>
              <input className="kbn" placeholder="Nome" value={draft.assignee || ''} onChange={e => setDraft({ ...draft, assignee: e.target.value })} />
            </div>
            <div>
              <label style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, display: 'block', marginBottom: 6, color: 'var(--text-faint)' }}>Prazo</label>
              <input type="date" className="kbn" value={draft.dueDate || ''} onChange={e => setDraft({ ...draft, dueDate: e.target.value })} />
            </div>
          </div>
          {/* Progress selector */}
          <div>
            <label style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, display: 'block', marginBottom: 10, color: 'var(--text-faint)' }}>% Progresso</label>
            {/* Bar preview */}
            <div style={{ height: 6, borderRadius: 6, background: 'var(--border)', overflow: 'hidden', marginBottom: 12 }}>
              <div style={{ height: '100%', width: `${draft.progress ?? 0}%`, background: PROGRESS_OPTIONS.find(p => p.value === (draft.progress ?? 0))?.color || '#3f3f46', borderRadius: 6, transition: 'width 0.25s ease, background 0.25s ease' }} />
            </div>
            <div className="flex gap-3">
              {PROGRESS_OPTIONS.map(p => {
                const active = (draft.progress ?? 0) === p.value;
                return (
                  <button key={p.value} onClick={() => setDraft({ ...draft, progress: p.value })}
                    style={{ flex: 1, padding: '8px 0', borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: 'pointer', transition: 'all 0.14s',
                      background: active ? p.color : p.color + '18',
                      color: active ? (p.value === 0 ? 'var(--text-dim)' : '#fff') : p.color,
                      border: `2px solid ${active ? p.color : p.color + '44'}` }}>
                    {p.label}
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        <div className="flex items-center justify-between" style={{ padding: 16, borderTop: '1px solid var(--border-soft)' }}>
          <button className="btn btn-danger" onClick={() => { if (confirm('Excluir este card?')) { onDelete(card.id); onClose(); } }}>
            <Trash2 size={13} /> Excluir
          </button>
          <div className="flex items-center gap-2">
            <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={save}><Check size={13} /> Salvar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PERMISSIONS PANEL — exibido no canto do board

  const viewLabel = permLabel(area.permissions.view, departments);
  const editLabel = permLabel(area.permissions.edit, departments);
  const isRestricted = area.permissions.view !== 'all' || area.permissions.edit !== 'all';

  return (
    <div className="perm-panel fade-in"
      style={{ background: 'var(--surface)', border: `1px solid ${isRestricted ? area.color + '66' : 'var(--border)'}`, borderRadius: 10, padding: '10px 14px', minWidth: 220, flexShrink: 0 }}>
      {/* Area title row */}
      <div className="flex items-center justify-between" style={{ marginBottom: 8 }}>
        <div className="flex items-center gap-2">
          <span style={{ width: 8, height: 8, borderRadius: '50%', background: area.color, flexShrink: 0 }} />
          <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)' }}>{area.name}</span>
        </div>
        <button onClick={onEdit} title="Configurar acesso"
          className="btn btn-ghost" style={{ padding: '3px 6px', fontSize: 11, color: 'var(--text-faint)' }}>
          <Settings size={12} /> Acesso
        </button>
      </div>

      {/* View row */}
      <div className="flex items-center gap-2" style={{ marginBottom: 5 }}>
        <div className="flex items-center gap-1" style={{ color: area.permissions.view === 'all' ? '#10b981' : '#0ea5e9', minWidth: 14 }}>
          {area.permissions.view === 'all' ? <GlobeIcon size={12} /> : <EyeIcon size={12} />}
        </div>
        <span style={{ fontSize: 11, color: 'var(--text-faint)', minWidth: 60 }}>Visualizar</span>
        <span style={{ fontSize: 11, fontWeight: 500, color: 'var(--text-dim)',
          background: area.permissions.view === 'all' ? 'rgba(16,185,129,0.1)' : 'rgba(14,165,233,0.1)',
          padding: '1px 7px', borderRadius: 20, border: `1px solid ${area.permissions.view === 'all' ? 'rgba(16,185,129,0.25)' : 'rgba(14,165,233,0.25)'}` }}>
          {viewLabel}
        </span>
      </div>

      {/* Edit row */}
      <div className="flex items-center gap-2">
        <div className="flex items-center gap-1" style={{ color: area.permissions.edit === 'all' ? '#f59e0b' : '#e11d48', minWidth: 14 }}>
          <PenIcon size={12} />
        </div>
        <span style={{ fontSize: 11, color: 'var(--text-faint)', minWidth: 60 }}>Editar</span>
        <span style={{ fontSize: 11, fontWeight: 500, color: 'var(--text-dim)',
          background: area.permissions.edit === 'all' ? 'rgba(245,158,11,0.1)' : 'rgba(225,29,72,0.1)',
          padding: '1px 7px', borderRadius: 20, border: `1px solid ${area.permissions.edit === 'all' ? 'rgba(245,158,11,0.25)' : 'rgba(225,29,72,0.25)'}` }}>
          {editLabel}
        </span>
      </div>
    </div>
  );
}

// ============================================================
// AREA SETTINGS MODAL
// ============================================================
function AreaSettingsModal({ area, departments, onSave, onClose, onDelete, canDelete }) {
  const [name,      setName]      = useState(area.name);
  const [color,     setColor]     = useState(area.color);
  const [viewMode,  setViewMode]  = useState(area.permissions.view === 'all' ? 'all' : 'specific');
  const [viewDepts, setViewDepts] = useState(area.permissions.view === 'all' ? [] : (area.permissions.view || []));
  const [editMode,  setEditMode]  = useState(area.permissions.edit === 'all' ? 'all' : 'specific');
  const [editDepts, setEditDepts] = useState(area.permissions.edit === 'all' ? [] : (area.permissions.edit || []));
  const [tab, setTab] = useState('geral'); // 'geral' | 'acesso'

  const toggleDept = (setter, current, deptId) => {
    setter(current.includes(deptId) ? current.filter(id => id !== deptId) : [...current, deptId]);
  };

  const handleSave = () => {
    if (!name.trim()) return;
    onSave({
      ...area,
      name: name.trim(),
      color,
      permissions: {
        view: viewMode === 'all' ? 'all' : viewDepts,
        edit: editMode === 'all' ? 'all' : editDepts,
      }
    });
  };

  const DeptSelector = ({ mode, setMode, depts, setDepts, accentColor, label }) => (
    <div>
      <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, color: 'var(--text-faint)', marginBottom: 10 }}>{label}</div>
      {/* Mode toggles */}
      <div className="flex gap-2" style={{ marginBottom: 10 }}>
        {[['all','Todos'], ['specific','Específico']].map(([val, lbl]) => (
          <button key={val} onClick={() => setMode(val)}
            style={{ padding: '5px 14px', borderRadius: 20, fontSize: 12, fontWeight: 500, cursor: 'pointer', border: '1px solid',
              background: mode === val ? accentColor : 'transparent',
              borderColor: mode === val ? accentColor : 'var(--border)',
              color: mode === val ? '#fff' : 'var(--text-dim)', transition: 'all 0.12s' }}>
            {val === 'all' && <span style={{ marginRight: 4 }}>🌐</span>}{lbl}
          </button>
        ))}
      </div>

      {/* Department chips */}
      {mode === 'specific' && (
        <div className="flex flex-wrap gap-2" style={{ marginTop: 4 }}>
          {departments.map(d => {
            const active = depts.includes(d.id);
            return (
              <button key={d.id} onClick={() => toggleDept(setDepts, depts, d.id)}
                className={`dept-chip ${active ? 'active' : ''}`}
                style={active ? { background: accentColor, color: 'var(--accent-text)', borderColor: accentColor } : {}}>
                {d.name}
              </button>
            );
          })}
          {depts.length === 0 && (
            <span style={{ fontSize: 11, color: 'var(--text-faint)', padding: '4px 0' }}>Selecione ao menos um departamento.</span>
          )}
        </div>
      )}
    </div>
  );

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center"
         style={{ padding: 16, background: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(4px)' }}
         onClick={onClose}>
      <div className="kbn-modal modal-in flex flex-col"
           style={{ background: 'var(--bg-soft)', border: '1px solid var(--border)', width: '100%', maxWidth: 520, maxHeight: '90vh', borderRadius: 14, boxShadow: '0 24px 64px rgba(0,0,0,0.6)' }}
           onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div className="flex items-center justify-between" style={{ padding: '18px 20px 0' }}>
          <div className="flex items-center gap-2">
            <span style={{ width: 10, height: 10, borderRadius: '50%', background: color }} />
            <span className="font-display" style={{ fontSize: 16, fontWeight: 600 }}>Configurar área</span>
          </div>
          <button onClick={onClose} className="btn btn-ghost" style={{ padding: 6 }}><X size={16} /></button>
        </div>

        {/* Tabs */}
        <div className="flex" style={{ padding: '12px 20px 0', gap: 4, borderBottom: '1px solid var(--border-soft)', marginTop: 8 }}>
          {[['geral','Geral'], ['acesso','Controle de Acesso']].map(([t, lbl]) => (
            <button key={t} onClick={() => setTab(t)}
              style={{ padding: '6px 14px', fontSize: 13, fontWeight: 500, background: 'none', border: 'none', cursor: 'pointer',
                color: tab === t ? 'var(--text)' : 'var(--text-faint)',
                borderBottom: tab === t ? `2px solid ${color}` : '2px solid transparent',
                marginBottom: -1, transition: 'color 0.12s' }}>
              {lbl}
            </button>
          ))}
        </div>

        {/* Body */}
        <div className="overflow-y-auto scrollbar-thin flex flex-col gap-5" style={{ padding: 20 }}>
          {tab === 'geral' && (
            <>
              <div>
                <label style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, display: 'block', marginBottom: 8, color: 'var(--text-faint)' }}>Nome da área</label>
                <input className="kbn" value={name} onChange={e => setName(e.target.value)} placeholder="Ex: Planejamento, Operações…" />
              </div>
              <div>
                <label style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, display: 'block', marginBottom: 10, color: 'var(--text-faint)' }}>Cor da área</label>
                <div className="flex flex-wrap gap-2">
                  {AREA_COLORS.map(c => (
                    <button key={c} onClick={() => setColor(c)}
                      style={{ width: 30, height: 30, borderRadius: '50%', background: c, border: color === c ? '3px solid #fff' : '3px solid transparent', cursor: 'pointer', outline: color === c ? `3px solid ${c}` : 'none', transition: 'all 0.12s' }} />
                  ))}
                </div>
              </div>
            </>
          )}

          {tab === 'acesso' && (
            <>
              <div style={{ background: 'var(--surface)', borderRadius: 8, padding: 14, border: '1px solid var(--border-soft)', fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.6 }}>
                <strong style={{ color: 'var(--accent)' }}>ℹ Como funciona:</strong> Defina quais departamentos podem <em>ver</em> os boards desta área e quais podem <em>editar</em> (criar/mover/excluir cards). Selecione "Todos" para acesso irrestrito.
              </div>

              <DeptSelector
                label="👁 Quem pode VISUALIZAR?"
                mode={viewMode} setMode={setViewMode}
                depts={viewDepts} setDepts={setViewDepts}
                accentColor="#10b981" />

              <div style={{ height: 1, background: 'var(--border-soft)' }} />

              <DeptSelector
                label="✏ Quem pode EDITAR?"
                mode={editMode} setMode={setEditMode}
                depts={editDepts} setDepts={setEditDepts}
                accentColor="#f59e0b" />
            </>
          )}
        </div>

        {/* Footer */}
        <div className="flex items-center justify-between" style={{ padding: '12px 20px', borderTop: '1px solid var(--border-soft)' }}>
          {canDelete ? (
            <button className="btn btn-danger" onClick={() => { if (confirm(`Excluir a área "${area.name}" e todos os boards dela?`)) { onDelete(area.id); onClose(); } }}>
              <Trash2 size={13} /> Excluir área
            </button>
          ) : <div />}
          <div className="flex gap-2">
            <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
            <button className="btn btn-primary" onClick={handleSave}
              style={{ background: color }}
              disabled={!name.trim()}>
              <Check size={13} /> Salvar
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// AREAS OVERVIEW — tela global com todas as áreas
// ============================================================
function AreasOverview({ areas, projects, boards, departments, activeAreaId, onOpenArea, onEditArea, onCreateArea }) {
  const stats = (areaId) => {
    const aProjects = projects.filter(p => p.areaId === areaId);
    const aBoards = boards.filter(b => b.areaId === areaId);
    const cards = aBoards.flatMap(b => b.columns.flatMap(c => c.cards));
    const avg = cards.length ? Math.round(cards.reduce((s, c) => s + (c.progress ?? 0), 0) / cards.length) : 0;
    return { projects: aProjects.length, boards: aBoards.length, cards: cards.length, avg };
  };

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between flex-wrap" style={{ marginBottom: 18, gap: 12 }}>
        <div>
          <h1 className="dash-title font-display" style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.02em' }}>Todas as áreas</h1>
          <span style={{ fontSize: 12, color: 'var(--text-faint)' }}>{areas.length} {areas.length === 1 ? 'área' : 'áreas'} · escolha uma para consultar</span>
        </div>
        <button className="btn btn-primary" onClick={() => { const n = prompt('Nome da nova área:'); if (n?.trim()) onCreateArea(n.trim()); }}>
          <Plus size={14} /> Nova área
        </button>
      </div>

      <div className="overview-grid">
        {areas.map(a => {
          const s = stats(a.id);
          const isActive = a.id === activeAreaId;
          return (
            <div key={a.id} className="overview-card"
              onClick={() => onOpenArea(a.id)}
              style={{ background: 'var(--surface)', border: `1px solid ${isActive ? a.color + '88' : 'var(--border)'}`, borderRadius: 14, padding: 0, cursor: 'pointer', overflow: 'hidden', transition: 'border-color 0.15s, transform 0.1s' }}>
              {/* faixa de cor */}
              <div style={{ height: 5, background: a.color }} />
              <div style={{ padding: 16 }}>
                <div className="flex items-start justify-between" style={{ gap: 8, marginBottom: 12 }}>
                  <div className="flex items-center gap-2 min-w-0">
                    <span style={{ width: 12, height: 12, borderRadius: '50%', background: a.color, flexShrink: 0 }} />
                    <span className="font-display truncate" style={{ fontSize: 17, fontWeight: 600 }}>{a.name}</span>
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); onEditArea(a); }}
                    className="btn btn-ghost" style={{ padding: 5, flexShrink: 0 }} title="Configurar área">
                    <Settings size={13} />
                  </button>
                </div>

                {/* stats */}
                <div className="flex" style={{ gap: 14, marginBottom: 12 }}>
                  <div><div style={{ fontSize: 20, fontWeight: 700, lineHeight: 1 }}>{s.projects}</div><div style={{ fontSize: 10, color: 'var(--text-faint)', marginTop: 2 }}>projetos</div></div>
                  <div><div style={{ fontSize: 20, fontWeight: 700, lineHeight: 1 }}>{s.boards}</div><div style={{ fontSize: 10, color: 'var(--text-faint)', marginTop: 2 }}>quadros</div></div>
                  <div><div style={{ fontSize: 20, fontWeight: 700, lineHeight: 1 }}>{s.cards}</div><div style={{ fontSize: 10, color: 'var(--text-faint)', marginTop: 2 }}>cards</div></div>
                </div>

                {/* progresso */}
                <div style={{ marginBottom: 12 }}>
                  <div className="flex items-center justify-between" style={{ marginBottom: 4 }}>
                    <span style={{ fontSize: 10, color: 'var(--text-faint)' }}>Progresso médio</span>
                    <span style={{ fontSize: 11, fontWeight: 600, color: a.color }}>{s.avg}%</span>
                  </div>
                  <div style={{ height: 6, borderRadius: 6, background: 'var(--border)', overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${s.avg}%`, background: a.color, borderRadius: 6, transition: 'width 0.4s' }} />
                  </div>
                </div>

                {/* permissões */}
                <div className="flex items-center gap-2 flex-wrap" style={{ paddingTop: 10, borderTop: '1px solid var(--border-soft)' }}>
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 10, color: 'var(--text-faint)' }}>
                    {a.permissions.view === 'all' ? <GlobeIcon size={11} /> : <EyeIcon size={11} />} {permLabel(a.permissions.view, departments)}
                  </span>
                  <span style={{ color: 'var(--text-faint)', opacity: 0.4 }}>·</span>
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 10, color: 'var(--text-faint)' }}>
                    <PenIcon size={11} /> {permLabel(a.permissions.edit, departments)}
                  </span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// PROJECTS OVERVIEW — tela com todos os projetos de uma área
// ============================================================
function ProjectsOverview({ area, projects, boards, activeProjectId, onBackToAreas, onOpenProject, onEditProject, onCreateProject }) {
  const stats = (projectId) => {
    const pBoards = boards.filter(b => b.projectId === projectId);
    const cards = pBoards.flatMap(b => b.columns.flatMap(c => c.cards));
    const avg = cards.length ? Math.round(cards.reduce((s, c) => s + (c.progress ?? 0), 0) / cards.length) : 0;
    return { boards: pBoards.length, cards: cards.length, avg };
  };

  return (
    <div className="fade-in">
      {/* breadcrumb + título */}
      <div style={{ marginBottom: 6 }}>
        <button onClick={onBackToAreas}
          style={{ display: 'inline-flex', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: 'pointer', padding: 0, color: 'var(--text-faint)' }}>
          <Grid size={12} /> <span style={{ fontSize: 12 }}>Todas as áreas</span>
        </button>
      </div>
      <div className="flex items-center justify-between flex-wrap" style={{ marginBottom: 18, gap: 12 }}>
        <div className="flex items-center gap-2 min-w-0">
          <span style={{ width: 14, height: 14, borderRadius: '50%', background: area.color, flexShrink: 0 }} />
          <div className="min-w-0">
            <h1 className="dash-title font-display truncate" style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.02em' }}>{area.name}</h1>
            <span style={{ fontSize: 12, color: 'var(--text-faint)' }}>{projects.length} {projects.length === 1 ? 'projeto' : 'projetos'} · escolha um para abrir</span>
          </div>
        </div>
        <button className="btn btn-primary" onClick={() => { const n = prompt('Nome do novo projeto:'); if (n?.trim()) onCreateProject(n.trim()); }}>
          <Plus size={14} /> Novo projeto
        </button>
      </div>

      <div className="overview-grid">
        {projects.map(p => {
          const s = stats(p.id);
          const isActive = p.id === activeProjectId;
          const c = p.color || '#8b5cf6';
          return (
            <div key={p.id} className="overview-card"
              onClick={() => onOpenProject(p.id)}
              style={{ background: 'var(--surface)', border: `1px solid ${isActive ? c + '88' : 'var(--border)'}`, borderRadius: 14, overflow: 'hidden', cursor: 'pointer', transition: 'border-color 0.15s, transform 0.1s' }}>
              <div style={{ height: 5, background: c }} />
              <div style={{ padding: 16 }}>
                <div className="flex items-start justify-between" style={{ gap: 8, marginBottom: 12 }}>
                  <div className="flex items-center gap-2 min-w-0">
                    <FolderIcon size={15} style={{ color: c, flexShrink: 0 }} />
                    <span className="font-display truncate" style={{ fontSize: 17, fontWeight: 600 }}>{p.name}</span>
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); onEditProject(p); }}
                    className="btn btn-ghost" style={{ padding: 5, flexShrink: 0 }} title="Configurar projeto">
                    <Settings size={13} />
                  </button>
                </div>

                <div className="flex" style={{ gap: 14, marginBottom: 12 }}>
                  <div><div style={{ fontSize: 20, fontWeight: 700, lineHeight: 1 }}>{s.boards}</div><div style={{ fontSize: 10, color: 'var(--text-faint)', marginTop: 2 }}>quadros</div></div>
                  <div><div style={{ fontSize: 20, fontWeight: 700, lineHeight: 1 }}>{s.cards}</div><div style={{ fontSize: 10, color: 'var(--text-faint)', marginTop: 2 }}>cards</div></div>
                </div>

                <div>
                  <div className="flex items-center justify-between" style={{ marginBottom: 4 }}>
                    <span style={{ fontSize: 10, color: 'var(--text-faint)' }}>Progresso médio</span>
                    <span style={{ fontSize: 11, fontWeight: 600, color: c }}>{s.avg}%</span>
                  </div>
                  <div style={{ height: 6, borderRadius: 6, background: 'var(--border)', overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${s.avg}%`, background: c, borderRadius: 6, transition: 'width 0.4s' }} />
                  </div>
                </div>
              </div>
            </div>
          );
        })}

        {/* card de adicionar */}
        <button onClick={() => { const n = prompt('Nome do novo projeto:'); if (n?.trim()) onCreateProject(n.trim()); }}
          className="overview-card"
          style={{ background: 'transparent', border: '1px dashed var(--border)', borderRadius: 14, cursor: 'pointer', minHeight: 150, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, color: 'var(--text-faint)' }}>
          <Plus size={22} /> <span style={{ fontSize: 13 }}>Novo projeto</span>
        </button>
      </div>
    </div>
  );
}

// ============================================================
// THEME SWITCHER — troca a cor do layout (azul / verde / preto)
// ============================================================
function ThemeSwitcher({ theme, onChange, compact }) {
  const [open, setOpen] = useState(false);
  const current = THEMES.find(t => t.id === theme) || THEMES[0];

  return (
    <div className="relative">
      <button onClick={() => setOpen(!open)} className="btn btn-outline"
        style={{ padding: compact ? 8 : '7px 12px' }}
        title="Cor do layout">
        <span style={{ position: 'relative', width: 14, height: 14, flexShrink: 0 }}>
          <span style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: current.swatch }} />
        </span>
        {!compact && <span style={{ fontSize: 13 }}>{current.name}</span>}
        <ChevronDown size={13} style={{ opacity: 0.6 }} />
      </button>
      {open && (
        <>
          <div className="fixed inset-0 z-10" onClick={() => setOpen(false)} />
          <div className="absolute fade-in" style={{ right: 0, top: 44, zIndex: 20, background: 'var(--surface)', border: '1px solid var(--border)', minWidth: 180, borderRadius: 8, padding: '6px 0', boxShadow: '0 20px 50px rgba(0,0,0,0.5)' }}>
            <div style={{ padding: '4px 12px 6px', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, color: 'var(--text-faint)' }}>Cor do layout</div>
            {THEMES.map(t => {
              const isActive = t.id === theme;
              return (
                <button key={t.id} onClick={() => { onChange(t.id); setOpen(false); }}
                  className="hover-bg" style={{ width: '100%', textAlign: 'left', padding: '8px 12px', fontSize: 13, background: 'none', border: 'none', cursor: 'pointer', color: isActive ? 'var(--text)' : 'var(--text-dim)', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ display: 'inline-flex', borderRadius: '50%', overflow: 'hidden', width: 16, height: 16, flexShrink: 0, border: '1px solid var(--border)' }}>
                    <span style={{ width: '50%', background: t.swatch }} />
                    <span style={{ width: '50%', background: t.dot2 }} />
                  </span>
                  <span className="flex-1">{t.name}</span>
                  {isActive && <Check size={13} style={{ color: t.swatch }} />}
                </button>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ============================================================
// AREA SWITCHER
// ============================================================
function AreaSwitcher({ areas, activeAreaId, onSelect, onCreate, onEditArea }) {
  const [open, setOpen] = useState(false);
  const [creating, setCreating] = useState(false);
  const [newName, setNewName] = useState('');
  const active = areas.find(a => a.id === activeAreaId);

  const submit = () => {
    const n = newName.trim();
    if (n) { onCreate(n); setNewName(''); setCreating(false); setOpen(false); }
  };

  return (
    <div className="relative">
      <button onClick={() => setOpen(!open)} className="btn btn-outline" style={{ padding: '7px 14px' }}>
        {active && <span style={{ width: 8, height: 8, borderRadius: '50%', background: active.color }} />}
        <FolderIcon size={13} />
        <span className="truncate" style={{ maxWidth: 160 }}>{active?.name || 'Sem área'}</span>
        <ChevronDown size={13} style={{ opacity: 0.6 }} />
      </button>
      {open && (
        <>
          <div className="fixed inset-0 z-10" onClick={() => { setOpen(false); setCreating(false); }} />
          <div className="absolute fade-in" style={{ left: 0, top: 44, zIndex: 20, background: 'var(--surface)', border: '1px solid var(--border)', minWidth: 260, borderRadius: 8, padding: '6px 0', boxShadow: '0 20px 50px rgba(0,0,0,0.5)' }}>
            <div style={{ padding: '4px 12px 6px', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, color: 'var(--text-faint)' }}>Áreas</div>
            {areas.map(a => (
              <div key={a.id} className="flex items-center hover-row">
                <button onClick={() => { onSelect(a.id); setOpen(false); }}
                  className="flex-1 hover-bg"
                  style={{ textAlign: 'left', padding: '7px 12px', fontSize: 13, background: 'none', border: 'none', cursor: 'pointer', color: a.id === activeAreaId ? 'var(--text)' : 'var(--text-dim)', display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ width: 8, height: 8, borderRadius: '50%', background: a.color, flexShrink: 0 }} />
                  <span className="truncate flex-1">{a.name}</span>
                  {a.id === activeAreaId && <Check size={12} style={{ color: a.color }} />}
                </button>
                <button onClick={(e) => { e.stopPropagation(); onEditArea(a); setOpen(false); }}
                  className="row-action btn btn-ghost" style={{ padding: '4px 8px' }}>
                  <Settings size={12} />
                </button>
              </div>
            ))}
            <div style={{ height: 1, background: 'var(--border-soft)', margin: '4px 0' }} />
            {creating ? (
              <div className="flex items-center gap-1" style={{ padding: '6px 8px' }}>
                <input autoFocus className="kbn" style={{ padding: '4px 8px', fontSize: 13 }}
                  placeholder="Nome da área…" value={newName} onChange={e => setNewName(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') { setCreating(false); setNewName(''); } }} />
                <button className="btn btn-primary" style={{ padding: 6 }} onClick={submit}><Check size={12} /></button>
              </div>
            ) : (
              <button onClick={() => setCreating(true)} className="hover-bg"
                style={{ width: '100%', textAlign: 'left', padding: '6px 12px', fontSize: 13, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text)', display: 'flex', alignItems: 'center', gap: 8 }}>
                <Plus size={12} /> Nova área
              </button>
            )}
          </div>
        </>
      )}
    </div>
  );
}

// ============================================================
// PROJECT SWITCHER (filtrado por área)
// ============================================================
function ProjectSwitcher({ projects, activeProjectId, activeAreaId, onSelect, onCreate, onEditProject }) {
  const [open, setOpen] = useState(false);
  const [creating, setCreating] = useState(false);
  const [newName, setNewName] = useState('');
  const areaProjects = projects.filter(p => p.areaId === activeAreaId);
  const active = areaProjects.find(p => p.id === activeProjectId);
  const activeColor = active?.color || '#8b5cf6';

  const submit = () => {
    const n = newName.trim();
    if (n) { onCreate(n); setNewName(''); setCreating(false); setOpen(false); }
  };

  return (
    <div className="relative">
      <button onClick={() => setOpen(!open)} className="btn btn-outline" style={{ padding: '7px 14px' }}>
        {active && <span style={{ width: 8, height: 8, borderRadius: '50%', background: activeColor, flexShrink: 0 }} />}
        <FolderIcon size={14} />
        <span className="truncate" style={{ maxWidth: 150 }}>{active?.name || 'Sem projeto'}</span>
