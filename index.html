// ============================================================
// DASHBOARD
// ============================================================
function Dashboard({ boards, areas, projects, activeAreaId, activeProjectId, activeBoardId }) {
  const [scope, setScope] = useState('board'); // 'board' | 'project' | 'area' | 'all'

  const allCards = (() => {
    let src = boards;
    if (scope === 'board') src = boards.filter(b => b.id === activeBoardId);
    else if (scope === 'project') src = boards.filter(b => b.projectId === activeProjectId);
    else if (scope === 'area') src = boards.filter(b => b.areaId === activeAreaId);
    return src.flatMap(b => b.columns.flatMap(c => c.cards.map(card => ({ ...card, _col: c.name, _board: b.name, _area: areas.find(a => a.id === b.areaId)?.name }))));
  })();

  const totalCards = allCards.length;
  const avgProgress = totalCards > 0 ? Math.round(allCards.reduce((s, c) => s + (c.progress ?? 0), 0) / totalCards) : 0;
  const done100 = allCards.filter(c => (c.progress ?? 0) === 100).length;
  const notStarted = allCards.filter(c => (c.progress ?? 0) === 0).length;
  const inProgress = totalCards - done100 - notStarted;

  // Progress distribution
  const progDist = PROGRESS_OPTIONS.map(p => ({
    ...p, count: allCards.filter(c => (c.progress ?? 0) === p.value).length,
  }));

  // Column distribution (current board scope)
  const boardForCols = boards.find(b => b.id === activeBoardId);
  const colDist = (boardForCols?.columns || []).map(c => ({ name: c.name, count: c.cards.length }));
  const maxCol = Math.max(...colDist.map(c => c.count), 1);

  // Priority distribution
  const priDist = Object.entries(PRIORITIES).map(([k, v]) => ({
    key: k, label: v.label, dot: v.dot, count: allCards.filter(c => (c.priority || 'low') === k).length,
  }));

  // Project breakdown (projetos da área ativa)
  const areaProjects = (projects || []).filter(p => p.areaId === activeAreaId);
  const projectDist = areaProjects.map(p => {
    const pCards = boards.filter(b => b.projectId === p.id).flatMap(b => b.columns.flatMap(c => c.cards));
    const avgP = pCards.length > 0 ? Math.round(pCards.reduce((s, c) => s + (c.progress ?? 0), 0) / pCards.length) : 0;
    const boardCount = boards.filter(b => b.projectId === p.id).length;
    return { ...p, count: pCards.length, avgProgress: avgP, boardCount };
  });

  // Area breakdown
  const areaDist = areas.map(a => {
    const aCards = boards.filter(b => b.areaId === a.id).flatMap(b => b.columns.flatMap(c => c.cards));
    const avgP = aCards.length > 0 ? Math.round(aCards.reduce((s, c) => s + (c.progress ?? 0), 0) / aCards.length) : 0;
    return { ...a, count: aCards.length, avgProgress: avgP };
  });

  const StatCard = ({ label, value, sub, color, icon }) => (
    <div className="dash-kpi-card" style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '18px 20px', flex: 1, minWidth: 140 }}>
      <div className="flex items-center justify-between" style={{ marginBottom: 10 }}>
        <span style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 500, color: 'var(--text-faint)' }}>{label}</span>
        <span style={{ color }}>{icon}</span>
      </div>
      <div className="dash-kpi-value" style={{ fontSize: 32, fontWeight: 700, color, lineHeight: 1, marginBottom: 4 }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: 'var(--text-faint)' }}>{sub}</div>}
    </div>
  );

  const activeArea = areas.find(a => a.id === activeAreaId);
  const activeProject = (projects || []).find(p => p.id === activeProjectId);

  return (
    <div className="fade-in" style={{ maxWidth: 1200 }}>
      {/* Header */}
      <div className="flex items-center justify-between flex-wrap" style={{ marginBottom: 20, gap: 12 }}>
        <div>
          <h1 className="dash-title font-display" style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.02em' }}>Dashboard</h1>
          <div className="flex items-center gap-1 flex-wrap" style={{ marginTop: 3 }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: activeArea?.color || 'var(--accent)' }} />
            <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>{activeArea?.name}</span>
            {activeProject && (
              <>
                <ChevronRight size={11} style={{ color: 'var(--text-faint)', opacity: 0.5 }} />
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: activeProject.color || '#8b5cf6' }} />
                <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>{activeProject.name}</span>
              </>
            )}
          </div>
        </div>
        {/* Scope selector */}
        <div className="dash-scope-btns flex gap-2">
          {[['board','Este quadro'],['project','Este projeto'],['area','Esta área'],['all','Todos']].map(([s, lbl]) => (
            <button key={s} onClick={() => setScope(s)}
              style={{ padding: '6px 14px', borderRadius: 20, fontSize: 12, fontWeight: 500, cursor: 'pointer',
                background: scope === s ? 'var(--accent)' : 'transparent',
                color: scope === s ? 'var(--accent-text)' : 'var(--text-dim)',
                border: `1px solid ${scope === s ? 'var(--accent)' : 'var(--border)'}`, transition: 'all 0.12s' }}>
              {lbl}
            </button>
          ))}
        </div>
      </div>

      {/* KPI Row */}
      <div className="flex gap-3" style={{ marginBottom: 20, flexWrap: 'wrap' }}>
        <StatCard label="Total de Cards" value={totalCards} sub="neste escopo" color="var(--text)" icon={<Layers size={16} />} />
        <StatCard label="Progresso Médio" value={`${avgProgress}%`} sub="média geral dos cards"
          color={avgProgress === 100 ? '#10b981' : avgProgress >= 50 ? '#0ea5e9' : avgProgress > 0 ? '#f59e0b' : 'var(--text-dim)'}
          icon={<TrendUp size={16} />} />
        <StatCard label="Concluídos" value={done100} sub={`${totalCards > 0 ? Math.round(done100/totalCards*100) : 0}% do total`} color="#10b981" icon={<Check size={16} />} />
        <StatCard label="Em Andamento" value={inProgress} sub="entre 25% e 75%" color="#0ea5e9" icon={<BarChart2 size={16} />} />
        <StatCard label="Não Iniciados" value={notStarted} sub="progresso em 0%" color="var(--text-faint)" icon={<AlertCircle size={16} />} />
      </div>

      {/* Main progress bar */}
      <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '18px 20px', marginBottom: 20 }}>
        <div className="flex items-center justify-between" style={{ marginBottom: 12 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>Progresso Geral do Projeto</span>
          <span style={{ fontSize: 22, fontWeight: 800, color: avgProgress === 100 ? '#10b981' : avgProgress >= 50 ? '#0ea5e9' : '#f59e0b' }}>{avgProgress}%</span>
        </div>
        <div style={{ height: 12, borderRadius: 12, background: 'var(--border)', overflow: 'hidden', position: 'relative' }}>
          <div style={{ height: '100%', width: `${avgProgress}%`, borderRadius: 12, transition: 'width 0.4s ease',
            background: avgProgress === 100 ? '#10b981' : avgProgress >= 50 ? '#0ea5e9' : avgProgress > 0 ? '#f59e0b' : '#3f3f46' }} />
        </div>
        {/* Milestone markers */}
        <div className="flex justify-between" style={{ marginTop: 6 }}>
          {[0,25,50,100].map(m => (
            <span key={m} style={{ fontSize: 10, color: avgProgress >= m ? 'var(--text-dim)' : 'var(--text-faint)', fontWeight: 500 }}>{m}%</span>
          ))}
        </div>
      </div>

      {/* Two-column grid */}
      <div className="dash-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
        {/* Progress distribution */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '18px 20px' }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)', marginBottom: 16 }}>Distribuição por % de Progresso</div>
          {progDist.map(p => (
            <div key={p.value} style={{ marginBottom: 14 }}>
              <div className="flex items-center justify-between" style={{ marginBottom: 5 }}>
                <div className="flex items-center gap-2">
                  <span style={{ width: 10, height: 10, borderRadius: '50%', background: p.color }} />
                  <span style={{ fontSize: 12, fontWeight: 600, color: p.color }}>{p.label}</span>
                </div>
                <span style={{ fontSize: 12, color: 'var(--text-dim)', fontWeight: 500 }}>
                  {p.count} card{p.count !== 1 ? 's' : ''} · {totalCards > 0 ? Math.round(p.count / totalCards * 100) : 0}%
                </span>
              </div>
              <div style={{ height: 8, borderRadius: 8, background: 'var(--border)', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: totalCards > 0 ? `${(p.count / totalCards) * 100}%` : '0%', background: p.color, borderRadius: 8, transition: 'width 0.4s ease' }} />
              </div>
            </div>
          ))}
        </div>

        {/* Column distribution */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '18px 20px' }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)', marginBottom: 16 }}>Cards por Coluna (board atual)</div>
          {colDist.length === 0 && <div style={{ fontSize: 12, color: 'var(--text-faint)' }}>Sem colunas.</div>}
          {colDist.map((c, i) => (
            <div key={i} style={{ marginBottom: 14 }}>
              <div className="flex items-center justify-between" style={{ marginBottom: 5 }}>
                <span style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-dim)' }}>{c.name}</span>
                <span style={{ fontSize: 12, color: 'var(--text-dim)', fontWeight: 500 }}>{c.count}</span>
              </div>
              <div style={{ height: 8, borderRadius: 8, background: 'var(--border)', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: `${(c.count / maxCol) * 100}%`, background: 'var(--accent)', borderRadius: 8, transition: 'width 0.4s ease', opacity: 0.7 + (i / colDist.length) * 0.3 }} />
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Two more panels */}
      <div className="dash-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        {/* Priority breakdown */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '18px 20px' }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)', marginBottom: 16 }}>Cards por Prioridade</div>
          <div className="flex gap-4">
            {priDist.map(p => (
              <div key={p.key} style={{ flex: 1, textAlign: 'center' }}>
                <div style={{ fontSize: 28, fontWeight: 700, color: p.dot, marginBottom: 4 }}>{p.count}</div>
                <div style={{ height: 4, borderRadius: 4, background: p.dot, marginBottom: 6, opacity: 0.7 }} />
                <div style={{ fontSize: 11, color: 'var(--text-faint)' }}>{p.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Areas breakdown */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '18px 20px' }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)', marginBottom: 16 }}>Progresso por Área</div>
          {areaDist.map(a => (
            <div key={a.id} style={{ marginBottom: 14 }}>
              <div className="flex items-center justify-between" style={{ marginBottom: 5 }}>
                <div className="flex items-center gap-2">
                  <span style={{ width: 8, height: 8, borderRadius: '50%', background: a.color }} />
                  <span style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-dim)' }}>{a.name}</span>
                </div>
                <span style={{ fontSize: 12, color: a.color, fontWeight: 600 }}>{a.avgProgress}%</span>
              </div>
              <div style={{ height: 8, borderRadius: 8, background: 'var(--border)', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: `${a.avgProgress}%`, background: a.color, borderRadius: 8, transition: 'width 0.4s ease' }} />
              </div>
              <div style={{ fontSize: 10, color: 'var(--text-faint)', marginTop: 3 }}>{a.count} card{a.count !== 1 ? 's' : ''}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Progresso por Projeto (área ativa) */}
      {projectDist.length > 0 && (
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '18px 20px', marginTop: 16 }}>
          <div className="flex items-center gap-2" style={{ marginBottom: 16 }}>
            <FolderIcon size={14} style={{ color: 'var(--text-faint)' }} />
            <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>Progresso por Projeto</span>
            <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>· {activeArea?.name}</span>
          </div>
          {projectDist.map(p => (
            <div key={p.id} style={{ marginBottom: 14 }}>
              <div className="flex items-center justify-between" style={{ marginBottom: 5 }}>
                <div className="flex items-center gap-2">
                  <span style={{ width: 8, height: 8, borderRadius: '50%', background: p.color || '#8b5cf6' }} />
                  <span style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-dim)' }}>{p.name}</span>
                  <span style={{ fontSize: 10, color: 'var(--text-faint)' }}>· {p.boardCount} {p.boardCount === 1 ? 'quadro' : 'quadros'}</span>
                </div>
                <span style={{ fontSize: 12, color: p.color || '#8b5cf6', fontWeight: 600 }}>{p.avgProgress}%</span>
              </div>
              <div style={{ height: 8, borderRadius: 8, background: 'var(--border)', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: `${p.avgProgress}%`, background: p.color || '#8b5cf6', borderRadius: 8, transition: 'width 0.4s ease' }} />
              </div>
              <div style={{ fontSize: 10, color: 'var(--text-faint)', marginTop: 3 }}>{p.count} card{p.count !== 1 ? 's' : ''}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function KanbanApp() {
  const [state, setState] = useState(null);
  const [loading, setLoading] = useState(true);
  const [openCardRef, setOpenCardRef] = useState(null);
  const [draggingCard, setDraggingCard] = useState(null);
  const [dropTarget, setDropTarget] = useState(null);
  const [search, setSearch] = useState('');
  const [syncStatus, setSyncStatus] = useState('connecting');
  const [editingArea, setEditingArea] = useState(null);
  const [editingProject, setEditingProject] = useState(null);
  const [editingBoard, setEditingBoard] = useState(null);
  const [view, setView] = useState('board'); // 'board' | 'dashboard' | 'areas' | 'projects'
  const showDash = view === 'dashboard';
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const [canInstall, setCanInstall] = useState(!!window.__canInstallApp);
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('kanban-theme') || DEFAULT_THEME; }
    catch { return DEFAULT_THEME; }
  });
  const [fbState, setFbState] = useState(() => {
    if (window.__fbNotConfigured) return 'unconfigured';
    if (window.__fbError) return 'error';
    if (window.fb) return 'ready';
    return 'waiting';
  });
  const saveTimer = useRef(null);
  const fileInputRef = useRef(null);
  const isApplyingRemote = useRef(false);

  // PWA: escuta evento de instalável
  useEffect(() => {
    const onInstallable = () => setCanInstall(true);
    window.addEventListener('pwa-installable', onInstallable);
    return () => window.removeEventListener('pwa-installable', onInstallable);
  }, []);

  // Tema: aplica no <html> e salva a preferência (por dispositivo)
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    // atualiza a cor da barra do navegador / status bar do PWA
    const meta = document.querySelector('meta[name="theme-color"]');
    const themeColor = { blue: '#3b5cff', green: '#10b981', black: '#000000' }[theme] || '#3b5cff';
    if (meta) meta.setAttribute('content', themeColor);
    try { localStorage.setItem('kanban-theme', theme); } catch {}
  }, [theme]);

  // Fecha drawer ao mudar para desktop
  useEffect(() => {
    const onResize = () => { if (window.innerWidth > 640) setMobileMenuOpen(false); };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  useEffect(() => {
    if (fbState !== 'waiting') return;
    const check = () => {
      if (window.__fbNotConfigured) setFbState('unconfigured');
      else if (window.__fbError) setFbState('error');
      else if (window.fb) setFbState('ready');
    };
    window.addEventListener('firebase-ready', check);
    check();
    return () => window.removeEventListener('firebase-ready', check);
  }, [fbState]);

  useEffect(() => {
    if (fbState !== 'ready') return;
    const { db, doc, onSnapshot, setDoc, serverTimestamp } = window.fb;
    const ref = doc(db, FB_DOC_PATH[0], FB_DOC_PATH[1]);
    const unsub = onSnapshot(ref, (snap) => {
      if (!snap.exists()) {
        const initial = INITIAL_STATE();
        const cleanInit = JSON.parse(JSON.stringify(initial));
        setDoc(ref, { ...cleanInit, _lastClient: CLIENT_ID, _updatedAt: serverTimestamp() }).catch(console.error);
        setState(initial); setLoading(false); setSyncStatus('online'); return;
      }
      const data = snap.data();
      const { _lastClient, _updatedAt, ...remoteState } = data;
      // Migrate: ensure areas/departments exist
      if (!remoteState.areas) {
        const areaId = uid('a');
        remoteState.areas = [{ id: areaId, name: 'Planejamento', color: '#3b5cff', permissions: { view: 'all', edit: 'all' } }];
        remoteState.activeAreaId = areaId;
        remoteState.departments = DEFAULT_DEPARTMENTS;
        remoteState.boards = (remoteState.boards || []).map(b => ({ ...b, areaId }));
      }
      if (!remoteState.departments) remoteState.departments = DEFAULT_DEPARTMENTS;
      // Migrate: garantir que cada board tem cor
      remoteState.boards = (remoteState.boards || []).map((b, i) => {
        if (b.color) return b;
        // Reaproveita cor da área ou pega uma da paleta de boards
        const area = (remoteState.areas || []).find(a => a.id === b.areaId);
        const fallback = area?.color || BOARD_COLORS[i % BOARD_COLORS.length];
        return { ...b, color: fallback };
      });
      // Migrate: garantir que existem PROJETOS (Área › Projeto › Board)
      if (!remoteState.projects || remoteState.projects.length === 0) {
        const projects = [];
        const areaToProject = {};
        (remoteState.areas || []).forEach(area => {
          const proj = { id: uid('p'), name: 'Projeto principal', areaId: area.id, color: area.color || '#8b5cf6', createdAt: Date.now() };
          projects.push(proj);
          areaToProject[area.id] = proj.id;
        });
        // Atribui cada board existente ao projeto da sua área
        remoteState.boards = (remoteState.boards || []).map(b => ({ ...b, projectId: b.projectId || areaToProject[b.areaId] }));
        remoteState.projects = projects;
        remoteState.activeProjectId = areaToProject[remoteState.activeAreaId] || projects[0]?.id;
      } else {
        // Garante que todo board tem projectId válido
        const validProjIds = new Set(remoteState.projects.map(p => p.id));
        const areaToProject = {};
        remoteState.projects.forEach(p => { if (!areaToProject[p.areaId]) areaToProject[p.areaId] = p.id; });
        remoteState.boards = (remoteState.boards || []).map(b => {
          if (b.projectId && validProjIds.has(b.projectId)) return b;
          return { ...b, projectId: areaToProject[b.areaId] || remoteState.projects[0]?.id };
        });
        if (!remoteState.activeProjectId || !validProjIds.has(remoteState.activeProjectId)) {
          remoteState.activeProjectId = areaToProject[remoteState.activeAreaId] || remoteState.projects[0]?.id;
        }
      }
      // Garante board ativo coerente com projeto ativo
      if (remoteState.activeProjectId) {
        const boardInProj = (remoteState.boards || []).find(b => b.id === remoteState.activeBoardId && b.projectId === remoteState.activeProjectId);
        if (!boardInProj) {
          const first = (remoteState.boards || []).find(b => b.projectId === remoteState.activeProjectId);
          if (first) remoteState.activeBoardId = first.id;
        }
      }
      setState(prev => {
        if (prev && JSON.stringify(prev) === JSON.stringify(remoteState)) return prev;
        isApplyingRemote.current = true;
        return remoteState;
      });
      setLoading(false); setSyncStatus('online');
    }, (err) => { console.error('Firebase listen error:', err); setSyncStatus('error'); setLoading(false); });
    return unsub;
  }, [fbState]);

  useEffect(() => {
    if (!state || loading || fbState !== 'ready') return;
    if (isApplyingRemote.current) { isApplyingRemote.current = false; return; }
    setSyncStatus('saving');
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        const { db, doc, setDoc, serverTimestamp } = window.fb;
        const ref = doc(db, FB_DOC_PATH[0], FB_DOC_PATH[1]);
        // Firestore NÃO aceita campos com valor `undefined` (gera erro 400).
        // JSON.parse(JSON.stringify(...)) remove qualquer undefined em qualquer nível.
        const clean = JSON.parse(JSON.stringify(state));
        await setDoc(ref, { ...clean, _lastClient: CLIENT_ID, _updatedAt: serverTimestamp() });
        setSyncStatus('online');
      } catch (e) { console.error(e); setSyncStatus('error'); }
    }, 500);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
  }, [state, loading, fbState]);

  const updateBoard = useCallback((boardId, updater) => {
    setState(s => ({ ...s, boards: s.boards.map(b => b.id === boardId ? updater(b) : b) }));
  }, []);

  const activeArea  = state?.areas.find(a => a.id === state.activeAreaId);
  const activeProject = (state?.projects || []).find(p => p.id === state.activeProjectId);
  const activeBoard = state?.boards.find(b => b.id === state.activeBoardId);

  // ---- Area management ----
  const createArea = (name) => {
    const color = AREA_COLORS[Math.floor(Math.random() * AREA_COLORS.length)];
    const newArea = { id: uid('a'), name, color, permissions: { view: 'all', edit: 'all' } };
    const newProject = { id: uid('p'), name: 'Projeto principal', areaId: newArea.id, color, createdAt: Date.now() };
    const newBoard = { id: uid('b'), name: 'Quadro principal', areaId: newArea.id, projectId: newProject.id, color, createdAt: Date.now(), columns: [
      { id: uid('c'), name: 'A fazer',        cards: [] },
      { id: uid('c'), name: 'Em andamento',   cards: [] },
      { id: uid('c'), name: 'Concluído',      cards: [] },
    ]};
    setState(s => ({ ...s,
      areas: [...s.areas, newArea],
      projects: [...(s.projects || []), newProject],
      boards: [...s.boards, newBoard],
      activeAreaId: newArea.id, activeProjectId: newProject.id, activeBoardId: newBoard.id }));
  };
  const saveArea = (updatedArea) => {
    setState(s => ({ ...s, areas: s.areas.map(a => a.id === updatedArea.id ? updatedArea : a) }));
  };
  const deleteArea = (areaId) => {
    setState(s => {
      const remainingAreas    = s.areas.filter(a => a.id !== areaId);
      const remainingProjects = (s.projects || []).filter(p => p.areaId !== areaId);
      const remainingBoards   = s.boards.filter(b => b.areaId !== areaId);
      if (remainingAreas.length === 0) return INITIAL_STATE();
      const newActiveArea    = remainingAreas[0];
      const newActiveProject = remainingProjects.find(p => p.areaId === newActiveArea.id) || remainingProjects[0];
      const newActiveBoard   = remainingBoards.find(b => b.projectId === newActiveProject?.id) || remainingBoards.find(b => b.areaId === newActiveArea.id) || remainingBoards[0];
      return { ...s, areas: remainingAreas, projects: remainingProjects, boards: remainingBoards,
        activeAreaId: newActiveArea.id, activeProjectId: newActiveProject?.id, activeBoardId: newActiveBoard?.id };
    });
  };
  const selectArea = (areaId) => {
    setState(s => {
      const firstProject = (s.projects || []).find(p => p.areaId === areaId);
      const firstBoard = s.boards.find(b => b.projectId === firstProject?.id) || s.boards.find(b => b.areaId === areaId);
      return { ...s, activeAreaId: areaId, activeProjectId: firstProject?.id || s.activeProjectId, activeBoardId: firstBoard?.id || s.activeBoardId };
    });
  };

  // ---- Project management ----
  const createProject = (name) => {
    const color = BOARD_COLORS[Math.floor(Math.random() * BOARD_COLORS.length)];
    const newProject = { id: uid('p'), name, areaId: state.activeAreaId, color, createdAt: Date.now() };
    const newBoard = { id: uid('b'), name: 'Quadro principal', areaId: state.activeAreaId, projectId: newProject.id, color, createdAt: Date.now(),
      columns: [
        { id: uid('c'), name: 'A fazer', cards: [] },
        { id: uid('c'), name: 'Em andamento', cards: [] },
        { id: uid('c'), name: 'Concluído', cards: [] },
      ]};
    setState(s => ({ ...s,
      projects: [...(s.projects || []), newProject],
      boards: [...s.boards, newBoard],
      activeProjectId: newProject.id, activeBoardId: newBoard.id }));
  };
  const saveProject = (updatedProject) => {
    setState(s => ({ ...s, projects: (s.projects || []).map(p => p.id === updatedProject.id ? { ...p, ...updatedProject } : p) }));
  };
  const deleteProject = (projectId) => {
    setState(s => {
      const proj = (s.projects || []).find(p => p.id === projectId);
      const areaId = proj?.areaId || s.activeAreaId;
      const remainingProjects = (s.projects || []).filter(p => p.id !== projectId);
      const remainingBoards   = s.boards.filter(b => b.projectId !== projectId);
      // se a área ficou sem projetos, recria um projeto vazio
      const areaProjects = remainingProjects.filter(p => p.areaId === areaId);
      let projects = remainingProjects, boards = remainingBoards, newProjId, newBoardId;
      if (areaProjects.length === 0) {
        const color = AREA_COLORS[0];
        const np = { id: uid('p'), name: 'Projeto principal', areaId, color, createdAt: Date.now() };
        const nb = { id: uid('b'), name: 'Quadro principal', areaId, projectId: np.id, color, createdAt: Date.now(), columns: [
          { id: uid('c'), name: 'A fazer', cards: [] }, { id: uid('c'), name: 'Em andamento', cards: [] }, { id: uid('c'), name: 'Concluído', cards: [] },
        ]};
        projects = [...remainingProjects, np];
        boards = [...remainingBoards, nb];
        newProjId = np.id; newBoardId = nb.id;
      } else {
        newProjId = areaProjects[0].id;
        newBoardId = (boards.find(b => b.projectId === newProjId) || {}).id;
      }
      return { ...s, projects, boards, activeProjectId: newProjId, activeBoardId: newBoardId };
    });
  };
  const selectProject = (projectId) => {
    setState(s => {
      const firstBoard = s.boards.find(b => b.projectId === projectId);
      return { ...s, activeProjectId: projectId, activeBoardId: firstBoard?.id || s.activeBoardId };
    });
  };

  // ---- Board management ----
  const createBoard = (name) => {
    const color = BOARD_COLORS[Math.floor(Math.random() * BOARD_COLORS.length)];
    const newBoard = { id: uid('b'), name, areaId: state.activeAreaId, projectId: state.activeProjectId, color, createdAt: Date.now(),
      columns: [
        { id: uid('c'), name: 'A fazer', cards: [] },
        { id: uid('c'), name: 'Em andamento', cards: [] },
        { id: uid('c'), name: 'Concluído', cards: [] },
      ]};
    setState(s => ({ ...s, boards: [...s.boards, newBoard], activeBoardId: newBoard.id }));
  };
  const saveBoard = (updatedBoard) => {
    setState(s => ({ ...s, boards: s.boards.map(b => b.id === updatedBoard.id ? { ...b, ...updatedBoard } : b) }));
  };
  const deleteBoard = (id) => {
    setState(s => {
      const remaining = s.boards.filter(b => b.id !== id);
      const projectBoards = remaining.filter(b => b.projectId === s.activeProjectId);
      return { ...s, boards: remaining, activeBoardId: projectBoards[0]?.id || remaining.find(b => b.areaId === s.activeAreaId)?.id || remaining[0]?.id };
    });
  };

  const addColumn = () => {
    const name = prompt('Nome da nova coluna:');
    if (!name?.trim()) return;
    updateBoard(activeBoard.id, b => ({ ...b, columns: [...b.columns, { id: uid('c'), name: name.trim(), cards: [] }] }));
  };
  const renameColumn = (colId, newName) => {
    updateBoard(activeBoard.id, b => ({ ...b, columns: b.columns.map(c => c.id === colId ? { ...c, name: newName } : c) }));
  };
  const deleteColumn = (colId) => {
    const col = activeBoard.columns.find(c => c.id === colId);
    if (col.cards.length > 0 && !confirm(`A coluna "${col.name}" tem ${col.cards.length} card(s). Excluir mesmo assim?`)) return;
    updateBoard(activeBoard.id, b => ({ ...b, columns: b.columns.filter(c => c.id !== colId) }));
  };

  const addCard = (columnId, title) => {
    const card = { id: uid('card'), title, description: '', labels: [], priority: 'low', progress: 0, dueDate: '', assignee: '', createdAt: Date.now() };
    updateBoard(activeBoard.id, b => ({ ...b, columns: b.columns.map(c => c.id === columnId ? { ...c, cards: [...c.cards, card] } : c) }));
  };
  const saveCard = (updatedCard) => {
    updateBoard(activeBoard.id, b => ({ ...b, columns: b.columns.map(c => ({ ...c, cards: c.cards.map(card => card.id === updatedCard.id ? updatedCard : card) })) }));
  };
  const deleteCard = (cardId) => {
    updateBoard(activeBoard.id, b => ({ ...b, columns: b.columns.map(c => ({ ...c, cards: c.cards.filter(card => card.id !== cardId) })) }));
  };
  const moveCard = (cardId, fromColumnId, toColumnId) => {
    if (fromColumnId === toColumnId) return;
    updateBoard(activeBoard.id, b => {
      let movingCard = null;
      const columns = b.columns.map(c => {
        if (c.id === fromColumnId) { const card = c.cards.find(x => x.id === cardId); if (card) movingCard = card; return { ...c, cards: c.cards.filter(x => x.id !== cardId) }; }
        return c;
      });
      if (!movingCard) return b;
      return { ...b, columns: columns.map(c => c.id === toColumnId ? { ...c, cards: [...c.cards, movingCard] } : c) };
    });
    setOpenCardRef(prev => prev && prev.cardId === cardId ? { ...prev, columnId: toColumnId } : prev);
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `kanban-sese-${new Date().toISOString().slice(0, 10)}.json`; a.click();
    URL.revokeObjectURL(url);
  };
  const handleImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.boards || !Array.isArray(data.boards)) throw new Error('Formato inválido');
        if (!confirm(`Importar este arquivo? Os dados atuais serão SUBSTITUÍDOS.`)) { e.target.value = ''; return; }
        // Normaliza para a hierarquia Área › Projeto › Board
        if (!data.areas || data.areas.length === 0) {
          const aId = uid('a');
          data.areas = [{ id: aId, name: 'Planejamento', color: '#3b5cff', permissions: { view: 'all', edit: 'all' } }];
          data.activeAreaId = aId;
          data.boards = data.boards.map(b => ({ ...b, areaId: aId }));
        }
        if (!data.departments) data.departments = DEFAULT_DEPARTMENTS;
        data.boards = data.boards.map((b, i) => b.color ? b : ({ ...b, color: (data.areas.find(a => a.id === b.areaId)?.color) || BOARD_COLORS[i % BOARD_COLORS.length] }));
        if (!data.projects || data.projects.length === 0) {
          const areaToProj = {};
          data.projects = data.areas.map(a => { const p = { id: uid('p'), name: 'Projeto principal', areaId: a.id, color: a.color || '#8b5cf6', createdAt: Date.now() }; areaToProj[a.id] = p.id; return p; });

          data.activeProjectId = areaToProj[data.activeAreaId] || data.projects[0]?.id;
        }
        setState(data);
      } catch (err) { alert('Arquivo inválido: ' + err.message); }
      e.target.value = '';
    };
    reader.readAsText(file);
  };

  const handleDragStart = (cardId, fromColumnId) => setDraggingCard({ cardId, fromColumnId });

            </div>
            <span className="font-display" style={{ fontSize: 18, fontWeight: 600 }}>Kanban SESE</span>
          </div>
          <h2 className="font-display" style={{ fontSize: 22, fontWeight: 600, marginBottom: 10 }}>Configure o Firebase</h2>
          <p style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6, marginBottom: 20 }}>

          </p>

            <li>Acesse <a href="https://console.firebase.google.com" target="_blank" style={{ color: 'var(--accent)' }}>console.firebase.google.com</a> e crie (ou abra) um projeto.</li>
            <li>No menu lateral, <b>Firestore Database</b> → <b>Criar banco de dados</b> → modo de teste → região <b>southamerica-east1</b>.</li>
            <li>Volte ao painel, clique no ícone <b>&lt;/&gt;</b> pra registrar um app web e copie o objeto <code style={{ background: 'var(--surface)', padding: '1px 5px', borderRadius: 3 }}>firebaseConfig</code>.</li>
            <li>Abra este arquivo num editor de texto e cole os valores no bloco marcado no topo.</li>
            <li>Salve, recarregue esta página. Pronto.</li>
          </ol>
          <div style={{ padding: 12, background: 'var(--accent-soft)', borderRadius: 6, fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.5 }}>

          </div>
        </div>
      </div>
    );

                  <div style={{ background: 'var(--surface)', border: '1px solid var(--border-soft)', borderRadius: 8, padding: 12 }}>
                    <div className="flex items-center gap-2" style={{ marginBottom: 8 }}>
                      <span style={{ color: activeArea.permissions.view === 'all' ? '#10b981' : '#0ea5e9', display: 'flex' }}>
                        {activeArea.permissions.view === 'all' ? <GlobeIcon size={13} /> : <EyeIcon size={13} />}
                      </span>
                      <span style={{ fontSize: 11, color: 'var(--text-faint)', minWidth: 56 }}>Visualizar</span>
                      <span style={{ fontSize: 11, fontWeight: 500, color: 'var(--text-dim)',
                        background: activeArea.permissions.view === 'all' ? 'rgba(16,185,129,0.1)' : 'rgba(14,165,233,0.1)',
                        padding: '2px 8px', borderRadius: 20,
                        border: `1px solid ${activeArea.permissions.view === 'all' ? 'rgba(16,185,129,0.25)' : 'rgba(14,165,233,0.25)'}` }}>
                        {permLabel(activeArea.permissions.view, state.departments)}
                      </span>
                    </div>
                    <div className="flex items-center gap-2" style={{ marginBottom: 10 }}>
                      <span style={{ color: activeArea.permissions.edit === 'all' ? '#f59e0b' : '#e11d48', display: 'flex' }}>
                        <PenIcon size={13} />
                      </span>
                      <span style={{ fontSize: 11, color: 'var(--text-faint)', minWidth: 56 }}>Editar</span>
                      <span style={{ fontSize: 11, fontWeight: 500, color: 'var(--text-dim)',
                        background: activeArea.permissions.edit === 'all' ? 'rgba(245,158,11,0.1)' : 'rgba(225,29,72,0.1)',
                        padding: '2px 8px', borderRadius: 20,
                        border: `1px solid ${activeArea.permissions.edit === 'all' ? 'rgba(245,158,11,0.25)' : 'rgba(225,29,72,0.25)'}` }}>
                        {permLabel(activeArea.permissions.edit, state.departments)}
                      </span>
                    </div>
                    <button className="btn btn-outline" style={{ justifyContent: 'flex-start', padding: '8px 12px', width: '100%' }}
                      onClick={() => { setEditingArea(activeArea); setMobileMenuOpen(false); }}>
                      <Shield size={13} /> Quem pode ver / editar
                    </button>
                  </div>
                </div>
              )}

              {/* Instalar app */}
              {canInstall && (
                <div>
                  <label style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600, color: 'var(--text-faint)', display: 'block', marginBottom: 6 }}>Aplicativo</label>
                  <button className="btn btn-primary" style={{ justifyContent: 'flex-start', padding: '10px 14px', width: '100%' }}
                    onClick={async () => { await window.installPWA?.(); setCanInstall(false); setMobileMenuOpen(false); }}>
                    <Smartphone size={14} /> Instalar no dispositivo
                  </button>
                  <div style={{ fontSize: 11, color: 'var(--text-faint)', marginTop: 6, lineHeight: 1.5 }}>
                    Instale o Kanban como app no seu celular para acesso rápido pela tela inicial.
                  </div>
                </div>
              )}
            </div>
          </div>
        </>
      )}

      {/* ===== MAIN ===== */}
      <main className="app-main" style={{ padding: '20px' }}>
        {view === 'areas' && state && (
          <AreasOverview
            areas={state.areas} projects={state.projects || []} boards={state.boards}
            departments={state.departments}
            activeAreaId={state.activeAreaId}
            onOpenArea={(id) => { selectArea(id); setView('projects'); }}
            onEditArea={(a) => setEditingArea(a)}
            onCreateArea={createArea} />
        )}

        {view === 'projects' && state && activeArea && (
          <ProjectsOverview
            area={activeArea}
            projects={(state.projects || []).filter(p => p.areaId === activeArea.id)}
            boards={state.boards}
            activeProjectId={state.activeProjectId}
            onBackToAreas={() => setView('areas')}
            onOpenProject={(id) => { selectProject(id); setView('board'); }}
            onEditProject={(p) => setEditingProject(p)}
            onCreateProject={createProject} />
        )}

        {view === 'dashboard' && state && activeArea && (
          <Dashboard boards={state.boards} areas={state.areas} projects={state.projects || []} activeAreaId={state.activeAreaId} activeProjectId={state.activeProjectId} activeBoardId={state.activeBoardId} />
        )}

        {view === 'board' && activeBoard && activeArea && (
          <>
            {/* Board title row + Permissions panel */}
            <div className="board-meta-row flex items-start justify-between" style={{ marginBottom: 16, gap: 16 }}>
              <div className="min-w-0" style={{ flex: 1 }}>
                <div className="flex items-center gap-3 flex-wrap">
                  {/* Cor do board (clicável pra editar) */}
                  <button onClick={() => setEditingBoard(activeBoard)}
                    title="Configurar board (nome e cor)"
                    style={{ width: 14, height: 14, borderRadius: '50%', background: activeBoard.color || '#3b5cff', flexShrink: 0, border: 'none', cursor: 'pointer', boxShadow: `0 0 0 2px ${(activeBoard.color || '#3b5cff')}22`, padding: 0 }} />
                  <h1 className="board-title font-display truncate" style={{ fontSize: 28, fontWeight: 600, letterSpacing: '-0.02em', maxWidth: '100%' }}>{activeBoard.name}</h1>
                  <span className="font-mono" style={{ fontSize: 11, color: 'var(--text-faint)' }}>
                    {activeBoard.columns.reduce((acc, c) => acc + c.cards.length, 0)} cards · {activeBoard.columns.length} colunas
                  </span>
                </div>
                {/* Breadcrumb clicável: Áreas › Área › Projeto */}
                <div className="flex items-center gap-1 flex-wrap" style={{ marginTop: 4 }}>
                  <button onClick={() => setView('areas')}
                    style={{ display: 'flex', alignItems: 'center', gap: 3, background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}
                    title="Ver todas as áreas">
                    <Grid size={11} style={{ color: 'var(--text-faint)' }} />
                    <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>Áreas</span>
                  </button>
                  <ChevronRight size={11} style={{ color: 'var(--text-faint)', opacity: 0.5 }} />
                  <button onClick={() => setView('projects')}
                    style={{ display: 'flex', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}
                    title="Ver projetos da área">
                    <span style={{ width: 6, height: 6, borderRadius: '50%', background: activeArea.color }} />
                    <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>{activeArea.name}</span>
                  </button>
                  {activeProject && (
                    <>
                      <ChevronRight size={11} style={{ color: 'var(--text-faint)', opacity: 0.5 }} />
                      <button onClick={() => setEditingProject(activeProject)}
                        title="Configurar projeto"
                        style={{ display: 'flex', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
                        <span style={{ width: 6, height: 6, borderRadius: '50%', background: activeProject.color || '#8b5cf6' }} />
                        <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>{activeProject.name}</span>
                      </button>
                    </>
                  )}
                </div>
              </div>

              {/* Permissions Panel */}
              <PermissionsPanel
                area={activeArea}
                departments={state.departments}
                onEdit={() => setEditingArea(activeArea)} />
            </div>

            {/* Columns */}
            <div className="flex overflow-x-auto scrollbar-thin" style={{ gap: 12, paddingBottom: 16, alignItems: 'flex-start' }}>
              {activeBoard.columns.map(col => (
                <Column key={col.id} column={col}
                  onAddCard={addCard} onRenameColumn={renameColumn} onDeleteColumn={deleteColumn}
                  onCardClick={openCard}
                  draggingCardId={draggingCard?.cardId}
                  onDragStartCard={handleDragStart} onDragEndCard={handleDragEnd}
                  onDropOnColumn={handleDrop} onDragOverColumn={handleDragOver}
                  isDropTarget={dropTarget === col.id} searchTerm={search} />
              ))}
              <button onClick={addColumn}
                className="hide-on-mobile"
                style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '0 16px', borderRadius: 8, fontSize: 13, fontWeight: 500, minWidth: 220, height: 44, background: 'transparent', border: '1px dashed var(--border)', color: 'var(--text-faint)', cursor: 'pointer', transition: 'all 0.12s' }}
                onMouseEnter={e => { e.currentTarget.style.background = 'var(--bg-soft)'; e.currentTarget.style.color = 'var(--text)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-faint)'; e.currentTarget.style.borderColor = 'var(--border)'; }}>
                <Plus size={14} /> Nova coluna
              </button>
            </div>

            {/* Botão "Nova coluna" full-width no mobile */}
            <button onClick={addColumn}
              className="mobile-only"
              style={{ width: '100%', alignItems: 'center', justifyContent: 'center', gap: 8, padding: '12px 16px', borderRadius: 8, fontSize: 13, fontWeight: 500, background: 'transparent', border: '1px dashed var(--border)', color: 'var(--text-faint)', cursor: 'pointer', marginTop: 4 }}>
              <Plus size={14} /> Nova coluna
            </button>
          </>
        )}
      </main>

      {/* ===== MODALS ===== */}
      {currentOpenCard && (
        <CardModal card={currentOpenCard} columnId={openCardRef.columnId}
          columns={activeBoard.columns} onSave={saveCard} onDelete={deleteCard}
          onClose={() => setOpenCardRef(null)} onMove={moveCard} />
      )}

      {editingArea && (
        <AreaSettingsModal
          area={editingArea}
          departments={state.departments}
          onSave={(updated) => { saveArea(updated); setEditingArea(null); }}
          onClose={() => setEditingArea(null)}
          onDelete={(id) => { deleteArea(id); setEditingArea(null); }}
          canDelete={state.areas.length > 1} />
      )}

      {editingProject && (
        <ProjectSettingsModal
          project={editingProject}
          boardCount={state.boards.filter(b => b.projectId === editingProject.id).length}
          onSave={(updated) => { saveProject(updated); setEditingProject(null); }}
          onClose={() => setEditingProject(null)}
          onDelete={(id) => { deleteProject(id); setEditingProject(null); }}
          canDelete={(state.projects || []).filter(p => p.areaId === editingProject.areaId).length > 1} />
      )}

      {editingBoard && (
        <BoardSettingsModal
          board={editingBoard}
          onSave={(updated) => { saveBoard(updated); setEditingBoard(null); }}
          onClose={() => setEditingBoard(null)}
          onDelete={(id) => { deleteBoard(id); setEditingBoard(null); }}
          canDelete={state.boards.filter(b => b.projectId === editingBoard.projectId).length > 1} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<KanbanApp />);
</script>

<!-- 📱 PWA: Service Worker + Botão de instalação                  -->
<!-- ============================================================ -->
<script>
  // Registra o service worker (somente em produção, em HTTPS ou localhost)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.warn('SW registration failed:', err);
      });
    });
  }

  // Captura o evento beforeinstallprompt (Android/Chrome)
  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    window.__canInstallApp = true;
    window.dispatchEvent(new Event('pwa-installable'));
  });

  window.installPWA = async () => {
    if (!deferredInstallPrompt) return false;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    window.__canInstallApp = false;
    return outcome === 'accepted';
  };

  // Aviso quando instalado
  window.addEventListener('appinstalled', () => {
    window.__canInstallApp = false;
    console.log('Kanban SESE instalado como aplicativo.');
  });
</script>
